databases: []

services:
  - type: web
    name: turku-analiz-platformu
    runtime: node
    plan: starter
    disk:
      name: turku-data
      mountPath: /data
      sizeGB: 1
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/turku-analiz.db
